name: 2 - PR to Main Tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run unit tests
        run: mvn test -Dgroups="unit" --no-transfer-progress

  system-tests:
    name: Run System Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Start application
        run: mvn spring-boot:run --no-transfer-progress &

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start..."
          for i in {1..30}; do
            curl -s http://localhost:8080 && break
            sleep 3
          done

      - name: Run system tests
        run: mvn test -Dgroups="system" --no-transfer-progress