name: 3 - Production Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  publish-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Get project version from pom.xml
        id: get-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ steps.get-version.outputs.version }}

  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: publish-docker

    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: banking-app-production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ needs.publish-docker.outputs.version }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [publish-docker, deploy-azure]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Wait for Azure deployment to stabilize
        run: sleep 45

      - name: Run Smoke Test
        run: mvn -B test -Dtest=SmokeTest --no-transfer-progress
        env:
          APP_URL: https://banking-app-production-h4awerbsgwd5aqdd.spaincentral-01.azurewebsites.net
          EXPECTED_VERSION: ${{ needs.publish-docker.outputs.version }}