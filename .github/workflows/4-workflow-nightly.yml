name: 4 - Nightly Multi-Browser Tests

on:
  schedule:
    - cron: "0 2 * * *" # Cada noche a las 2:00 AM UTC
  workflow_dispatch:

jobs:
  system-tests:
    name: System Tests - ${{ matrix.browser }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chrome
          - os: ubuntu-latest
            browser: firefox
          - os: windows-latest
            browser: chrome
          - os: windows-latest
            browser: firefox
          - os: windows-latest
            browser: edge
          - os: macos-latest
            browser: chrome
          - os: macos-latest
            browser: firefox
          - os: macos-latest
            browser: safari

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Start application
        run: mvn spring-boot:run --no-transfer-progress &
        shell: bash

      - name: Wait for application to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080 && break
            sleep 3
          done
        shell: bash

      - name: Run system tests (${{ matrix.browser }})
        run: mvn test -Dgroups="system" -Dbrowser=${{ matrix.browser }} --no-transfer-progress
        shell: bash

  publish-nightly:
    name: Publish Nightly Docker Image
    runs-on: ubuntu-latest
    needs: system-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push nightly Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:nightly-${{ steps.date.outputs.date }}
